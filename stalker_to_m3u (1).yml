name: Generate M3U Playlist

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2          # Lấy 2 commit gần nhất để so sánh thay đổi
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python stalker_to_m3u.py
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Mac_playlist.m3u
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Mac_playlist.m3u"
          # Kéo thay đổi từ remote về và rebase để tránh lỗi push rejected
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

  trigger_others:
    runs-on: ubuntu-latest
    needs: [build]
    if: success()
    steps:
      - name: Checkout để kiểm tra Mac_playlist.m3u
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Kiểm tra file Mac_playlist.m3u có thay đổi không
        id: check_mac
        run: |
          if git diff HEAD~1 HEAD --name-only | grep -q "Mac_playlist.m3u"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Phát hiện Mac_playlist.m3u thay đổi"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ Mac_playlist.m3u không thay đổi, bỏ qua trigger"
          fi
      - name: Trigger FootOnSat_Optimize
        if: steps.check_mac.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          echo "📡 Gửi trigger đến FootOnSat_Optimize.yml..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/FootOnSat_Optimize.yml/dispatches \
            -d '{"ref":"main"}'
      - name: Trigger Football_match_live
        if: steps.check_mac.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          echo "📡 Gửi trigger đến Football_match_live.yml..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/Football_match_live.yml/dispatches \
            -d '{"ref":"main"}'
