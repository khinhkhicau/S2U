name: Football match live scrape

on:
  schedule:
    - cron: '10 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install curl_cffi pycountry
          pip install aiohttp pyyaml

      - name: Convert URLs to local paths in M3U_list.txt
        run: |
          sed -i 's|https://raw.githubusercontent.com/khinhkhicau/S2U/1/||g' M3U_list.txt
      
      - name: Run script
        run: python Football_match_live.py --no-footonsat --skip-validation

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add Football_match_live.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update Football_match_live.m3u (Scrape live match football)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
